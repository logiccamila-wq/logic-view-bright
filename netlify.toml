[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  # VITE_SUPABASE_URL is a public Supabase project URL (not a secret).
  # It may appear in the build output due to Vite env var inlining.
  # This prevents false-positive secrets scan failures.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
